[pytest]
asyncio_mode = auto
timeout = 30
addopts = -v
python_files = test_*.py scenario_*.py adv_*.py bench_*.py
markers =
    golden: end-to-end golden scenarios requiring a real Windows desktop (deselected in CI)
    adversarial: failure-mode and edge-case tests (always run; no external dependencies)
    benchmark: performance benchmarks (run via `make bench`)
